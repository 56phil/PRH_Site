baseURL = 'https://huffmanwrites.org'
defaultContentLanguage = 'en'
languageCode = 'en-us'
title = 'Huffman Writes'
theme = 'PaperMod'
pluralizeListTitles = false

[params]
  author = 'Phil Huffman'
  description = 'Writings on Stoicism, philosophy, and life'
  ShowReadingTime = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false

  [params.homeInfoParams]
    Title = "Huffman Writes"
    Content = "Writings on Stoicism, philosophy, and the pursuit of a well-lived life"

  [[params.socialIcons]]
    name = 'website'
    url = 'https://huffmanwrites.org'

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[sitemap]
  changefreq = 'monthly'
  filename = 'sitemap.xml'
  priority = 0.5

[outputs]
  home = ['HTML', 'RSS']
  page = ['HTML']

[menu]
  [[menu.main]]
    identifier = 'home'
    name = 'Home'
    url = '/'
    weight = 10
  [[menu.main]]
    identifier = 'posts'
    name = 'Posts'
    url = '/posts/'
    weight = 20
  [[menu.main]]
    identifier = 'tags'
    name = 'Tags'
    url = '/tags/'
    weight = 30
