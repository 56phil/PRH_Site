{{- $title := .Get "title" -}}
{{- $subtitle := .Get "subtitle" -}}
{{- $img := .Get "img" -}}
{{- $link := .Get "link" -}}

<div class="book-entry">
{{- if $img -}}
<div class="book-cover">
{{- if $link -}}<a href="{{ $link }}" target="_blank" rel="noopener">{{- end -}}
<img src="/{{ $img }}" alt="{{ $title }} cover" loading="lazy">
{{- if $link -}}</a>{{- end -}}
</div>
{{- end -}}
<div class="book-info">
<h3>{{- if $link -}}<a href="{{ $link }}" target="_blank" rel="noopener">{{- end -}}{{ $title }}{{- if $link -}}</a>{{- end -}}</h3>
<p>{{ $subtitle }}</p>
</div>
</div>
